name: Aura Cloud Validator

on:
  repository_dispatch:
    types: [cloud_tx]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install eth-account requests

      - name: Run Cloud Validator
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: python cloud_validator.py '${{ toJson(github.event.client_payload) }}'

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Aura Cloud Validator"
          git add ledger.json
          git commit -m "feat: Cloud Validator processed transaction" || echo "No changes"
          git push
