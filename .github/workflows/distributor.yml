name: Aura Eternity Distributor Bot

on:
  schedule:
    # รันเวลา 17:00 UTC (เท่ากับ 00:00 เที่ยงคืน ตามเวลาประเทศไทย) ทุกวัน
    - cron: '0 17 * * *'
  
  # หรือสามารถกดปุ่มให้แมนนวล รันทดสอบได้จากหน้าเว็บ
  workflow_dispatch:

jobs:
  distribute_rewards:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'aura-guardian-node/package-lock.json'

      - name: 📦 Install Guardian Dependencies
        working-directory: ./aura-guardian-node
        run: npm ci || npm install

      - name: 🚀 Execute Distributor Payload
        working-directory: ./aura-guardian-node
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RPC_URL: ${{ secrets.RPC_URL }}
          DISTRIBUTOR_PRIVATE_KEY: ${{ secrets.DISTRIBUTOR_PRIVATE_KEY }}
        run: npm run distribute
