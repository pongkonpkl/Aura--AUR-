name: Aura Midnight Distribution

on:
  schedule:
    - cron: '0 0 * * *' # Midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  distribute:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Distributor
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
        run: python distributor.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Aura Cloud Distributor"
          git add ledger.json
          git commit -m "chore: Automint daily distribution" || echo "No changes"
          git push
