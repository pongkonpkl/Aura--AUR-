name: Aura Midnight Distribution

on:
  schedule:
    - cron: '0 0 * * *' # Midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Distributor
        run: python distributor.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Aura Cloud Distributor"
          git add ledger.json
          git commit -m "chore: Automint daily distribution" || echo "No changes"
          git push
