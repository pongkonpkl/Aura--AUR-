name: Aura Eternity Distributor Bot

on:
  schedule:
    # GitHub Actions รองรับขั้นต่ำทุก 5 นาที
    - cron: '*/5 * * * *'
  
  # หรือสามารถกดปุ่มให้แมนนวล รันทดสอบได้จากหน้าเว็บ
  workflow_dispatch:

concurrency:
  group: aura-minute-distributor
  cancel-in-progress: false

jobs:
  distribute_rewards:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'aura-guardian-node/package-lock.json'

      - name: 📦 Install Guardian Dependencies
        working-directory: ./aura-guardian-node
        run: npm ci || npm install

      - name: 🚀 Execute Distributor Payload
        working-directory: ./aura-guardian-node
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RPC_URL: ${{ secrets.RPC_URL }}
          DISTRIBUTOR_PRIVATE_KEY: ${{ secrets.DISTRIBUTOR_PRIVATE_KEY }}
          REWARD_DISTRIBUTOR_ADDRESS: ${{ secrets.REWARD_DISTRIBUTOR_ADDRESS }}
        run: |
          set -e
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_KEY"
          test -n "$RPC_URL"
          test -n "$DISTRIBUTOR_PRIVATE_KEY"
          test -n "$REWARD_DISTRIBUTOR_ADDRESS"

          echo "Starting 5-minute minute-slot runner..."
          for i in 1 2 3 4 5; do
            echo "Run $i/5"
            npm run distribute
            if [ "$i" -lt 5 ]; then
              sleep 60
            fi
          done
